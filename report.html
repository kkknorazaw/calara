<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>事件报告 - Calara</title>
  <link rel="icon" href="icon__qm6orvk.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/report.css">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="index.html">CALARA</a>
      <button id="lang-toggle" class="lang-btn" type="button">中文 / EN</button>
    </div>
  </header>

  <main class="shell main">
    <section class="head">
      <div class="crumb"><a id="back-home" href="index.html">← 返回首页</a></div>
      <h1 id="title" class="title">加载中...</h1>
      <div id="meta" class="meta"></div>
      <div class="actions">
        <a id="open-original" class="btn" href="#" target="_blank" rel="noreferrer">查看原始报告</a>
        <button id="copy-id" class="btn primary" type="button">复制事件ID</button>
      </div>
    </section>

    <section class="grid">
      <div class="box">
        <div class="k" id="k-usd">估算损失</div>
        <div class="v" id="v-usd">-</div>
      </div>
      <div class="box">
        <div class="k" id="k-time">事件时间</div>
        <div class="v" id="v-time" style="font-size:16px;color:#111827;">-</div>
      </div>
      <div class="box">
        <div class="k" id="k-type">事件类型</div>
        <div class="v" id="v-type" style="font-size:16px;color:#111827;">-</div>
      </div>
      <div class="box">
        <div class="k" id="k-status">验证状态</div>
        <div class="v" id="v-status" style="font-size:16px;color:#111827;">-</div>
      </div>
    </section>

    <section class="section">
      <h2 id="tx-title">关键交易</h2>
      <div id="tx-list"></div>
    </section>

    <section class="section article">
      <h2 id="analysis-title">事件分析报告</h2>
      <div id="analysis-body"></div>
    </section>

    <p class="foot">Calara · Incident Intelligence</p>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/report.js"></script>
</body>
</html>
