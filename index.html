<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calara - DeFi 安全事件情报台</title>
  <meta name="description" content="Calara 实时收录 DeFi 安全事件，提供可复现报告、关键损失与根因追踪。">
  <link rel="icon" href="icon__qm6orvk.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/home.css">
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span>CALARA</span>
      </a>
      <div class="top-actions">
        <nav class="nav">
          <a id="nav-pricing" href="pricing/index.html">定价</a>
          <a id="nav-research" href="research/index.html">研究</a>
          <a id="nav-license" href="license/index.html">授权</a>
        </nav>
        <button id="lang-toggle" class="lang-btn" type="button" aria-label="语言切换">中文 / EN</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero-grid">
        <div>
          <h1>每一笔攻击，都需要被看见并被解释。</h1>
          <p>
            面向安全团队与项目方的事故情报首页。你可以直接搜索事件、按类型筛选，并快速进入完整报告页。
          </p>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="label">已收录事件</div>
            <div class="value" id="stat-total">-</div>
          </div>
          <div class="stat">
            <div class="label">攻击事件</div>
            <div class="value" id="stat-attack">-</div>
          </div>
          <div class="stat">
            <div class="label">MEV 事件</div>
            <div class="value" id="stat-mev">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel" aria-labelledby="incident-title">
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="搜索标题、ID、损失金额...">
        <div class="tabs">
          <button type="button" class="tab active" data-type="all">全部</button>
          <button type="button" class="tab" data-type="ATTACK">攻击</button>
          <button type="button" class="tab" data-type="NON_ATTACK_MEV">MEV</button>
        </div>
      </div>

      <div class="list" id="incident-list"></div>

      <div class="pager">
        <span id="pager-info">-</span>
        <div>
          <button id="prev-page" type="button">上一页</button>
          <button id="next-page" type="button">下一页</button>
        </div>
      </div>
    </section>

    <p class="foot">
      最近更新时间：<span id="last-updated">-</span> · 数据来自当前静态归档
    </p>
  </main>

  <script src="assets/i18n.js"></script>
  <script src="assets/home.js"></script>
</body>
</html>
